# Example ClusterIssuer. Review and customize before applying in production.
# This example relies on automatic zone detection and therefore works without
# `config.zone` and without `HETZNER_DNS_ZONE`.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-hetzner
  labels:
    app.kubernetes.io/name: hetzner-acme-webhook
    app.kubernetes.io/version: 1.1.0
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: you@example.com
    privateKeySecretRef:
      name: letsencrypt-hetzner
    solvers:
      - dns01:
          webhook:
            groupName: acme.mattwend.github.io
            solverName: hetzner
            config: {}
